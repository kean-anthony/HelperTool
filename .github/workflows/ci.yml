name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches:
      - main
      - develop

jobs:
  check:
    name: Check for Errors
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Code/package-lock.json

      - name: Install dependencies
        working-directory: Code
        run: npm ci

      # ── 1. Syntax check all JS files ─────────────────────────────────────
      - name: Syntax check — all JS files
        run: |
          npm install -g acorn 2>/dev/null
          ERRORS=0
          while IFS= read -r -d '' f; do
            acorn --ecma2022 --module "$f" > /dev/null 2>&1 \
              && echo "✅ $f" \
              || { echo "❌ Syntax error in $f"; ERRORS=$((ERRORS+1)); }
          done < <(find Code/ -name '*.js' -not -path '*/node_modules/*' -print0)
          [ $ERRORS -eq 0 ] || exit 1

      # ── 2. IPC integrity: every preload invoke has a handler ────────────
      - name: IPC channel integrity check
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');

            function findHandlers(dir) {
              const names = [];
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) {
                  if (entry.name !== 'node_modules') names.push(...findHandlers(full));
                } else if (entry.name.endsWith('.js')) {
                  const src = fs.readFileSync(full, 'utf-8');
                  for (const m of src.matchAll(/ipcMain\.handle\(['\"]([^'\"]+)['\"],/g)) {
                    names.push(m[1]);
                  }
                }
              }
              return names;
            }

            const preload = fs.readFileSync('Code/preload.js', 'utf-8');
            const handlers = findHandlers('Code');
            const invokes  = [...preload.matchAll(/ipcRenderer\.invoke\(['\"]([^'\"]+)['\"][\s,)]/g)].map(m => m[1]);

            const missing = invokes.filter(ch => !handlers.includes(ch));
            missing.forEach(ch => console.error('❌ preload invokes [' + ch + '] but no handler found'));
            if (missing.length) process.exit(1);
            console.log('✅ All ' + invokes.length + ' IPC channels have handlers');
          "

      # ── 3. Merge conflict markers ────────────────────────────────────────
      - name: Check for merge conflict markers
        run: |
          CONFLICTS=$(grep -rn "^<<<<<<< \|^>>>>>>> \|^=======$" Code/ \
            --include="*.js" --include="*.json" --include="*.html" --include="*.css" \
            --exclude-dir=node_modules || true)
          if [ -n "$CONFLICTS" ]; then
            echo "❌ Merge conflict markers found:"
            echo "$CONFLICTS"
            exit 1
          fi
          echo "✅ No merge conflict markers"

      # ── 4. Required dirs exist ───────────────────────────────────────────
      - name: Required directories check
        run: |
          MISSING=0
          for d in Code/config Code/utils Code/ipc Code/renderer; do
            [ -d "$d" ] && echo "✅ $d" || { echo "❌ Missing: $d"; MISSING=$((MISSING+1)); }
          done
          [ -f Code/main.js ] && echo "✅ Code/main.js" || { echo "❌ Missing: Code/main.js"; MISSING=$((MISSING+1)); }
          [ -f Code/preload.js ] && echo "✅ Code/preload.js" || { echo "❌ Missing: Code/preload.js"; MISSING=$((MISSING+1)); }
          [ -f Code/renderer/index.html ] && echo "✅ Code/renderer/index.html" || { echo "❌ Missing: Code/renderer/index.html"; MISSING=$((MISSING+1)); }
          [ $MISSING -eq 0 ] || exit 1